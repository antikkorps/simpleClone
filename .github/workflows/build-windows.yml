name: Build Windows executable

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # Permet aussi un build manuel depuis l'onglet Actions

permissions:
  contents: write  # Requis par softprops/action-gh-release pour créer/éditer les Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name SimpleClone SimpleClone.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleClone-${{ github.ref_name }}
          path: dist/SimpleClone.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SimpleClone.exe
          generate_release_notes: true
